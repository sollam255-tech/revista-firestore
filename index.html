<!DOCTYPE html>
<html>
<head>
<title>Reportes</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

.card {
  border: 1px solid #ccc;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
}

.btn {
  display: inline-block;
  margin-top: 10px;
  background: #0077b6;
  color: white;
  padding: 6px 12px;
  border-radius: 5px;
  text-decoration: none;
}

.btn:hover {
  background: #023e8a;
}
</style>

</head>
<body>

<h1>Reportes de Accidentes</h1>

<div id="lista"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVZhDybZ7JufZ_EMQzAFYI9WO-1LBRbeM",
  authDomain: "revista-motos-1b613.firebaseapp.com",
  projectId: "revista-motos-1b613",
  storageBucket: "revista-motos-1b613.firebasestorage.app",
  messagingSenderId: "251374972056",
  appId: "1:251374972056:web:424d09982f5b6598fbb4ed",
  measurementId: "G-B85RPD94PE"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");

const q = query(
  collection(db, "Reportes"),
  orderBy("Fecha_Accidente", "desc")
);

const querySnapshot = await getDocs(q);

querySnapshot.forEach((doc) => {
  const data = doc.data();

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <strong>Edad:</strong> ${data.Edad || "No disponible"} <br>
    <strong>Usa casco:</strong> ${data.Usa_Casco || "No disponible"} <br>
    <strong>Exceso de velocidad:</strong> ${data.Exceso_Velocidad || "No disponible"} <br>
    <strong>Tipo de incidente:</strong> ${data.Tipo_Incidente || "No disponible"} <br>
    <strong>Lesiones:</strong> ${data.Lesiones || "No disponible"} <br>
    <strong>Ubicación:</strong> ${data.Ubicación || "No disponible"} <br>
    <strong>Fecha del accidente:</strong> ${data.Fecha_Accidente || "No disponible"} <br>
    <strong>Fecha de registro:</strong>
    ${
      data.Fecha_Registro
        ? data.Fecha_Registro.toDate().toLocaleDateString()
        : "No disponible"
    }
    <br><br>

    ${
      data.Link
        ? `<a href="${data.Link}" target="_blank" class="btn">Ver evidencia</a>`
        : `<span>❌ Sin evidencia</span>`
    }
  `;

  lista.appendChild(div);
});
</script>

</body>
</html>
