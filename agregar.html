<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agregar Reporte</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    max-width: 600px;
    margin: auto;
}

input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0 15px 0;
    box-sizing: border-box;
}

button {
    background: #e63946;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
}

button:hover {
    background: #c1121f;
}

h1 {
    text-align: center;
}
</style>

</head>
<body>

<h1>Agregar Reporte de Accidente</h1>

<form id="formulario">

<label>Edad:</label>
<input type="number" id="edad" required>

<label>Usa casco:</label>
<select id="casco">
    <option value="si">Sí</option>
    <option value="no">No</option>
</select>

<label>Exceso de velocidad:</label>
<select id="velocidad">
    <option value="si">Sí</option>
    <option value="no">No</option>
</select>

<label>Tipo de incidente:</label>
<input type="text" id="tipo" required>

<label>Lesiones:</label>
<input type="text" id="lesiones" required>

<label>Ubicación:</label>
<input type="text" id="ubicacion" required>

<label>Fecha del accidente:</label>
<input type="date" id="fecha" required>

<label>Link de evidencia (opcional):</label>
<input type="url" id="link" placeholder="https://...">

<button type="submit">Guardar Reporte</button>

</form>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAL7n_6pBJaOsF9f4aFlReu9CBTw0HcYOw",
    authDomain: "revista-motos.firebaseapp.com",
    projectId: "revista-motos",
    storageBucket: "revista-motos.firebasestorage.app",
    messagingSenderId: "554552666157",
    appId: "1:554552666157:web:5ca3ad332829931436f0a4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("formulario").addEventListener("submit", async (e) => {

    e.preventDefault();

    const link = document.getElementById("link").value.trim();

    try {

        await addDoc(collection(db, "Reportes"), {
            Edad: parseInt(document.getElementById("edad").value),
            Usa_Casco: document.getElementById("casco").value,
            Exceso_Velocidad: document.getElementById("velocidad").value,
            Tipo_Incidente: document.getElementById("tipo").value,
            Lesiones: document.getElementById("lesiones").value,
            Ubicacion: document.getElementById("ubicacion").value,
            Fecha_Accidente: document.getElementById("fecha").value,
            Fecha_Registro: serverTimestamp(),
            Link: link || null
        });

        alert("? Reporte guardado correctamente");
        document.getElementById("formulario").reset();

    } catch (error) {

        console.error(error);

        alert(
            "? Error al guardar.\n\n" +
            error.message +
            "\n\nRevisa las reglas de Firestore."
        );
    }
});

</script>

</body>
</html>
